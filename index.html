<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>muatool</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* === CÀI ĐẶT CƠ BẢN === */
        :root {
            --bg-body: #14151a;
            --bg-header: #1e1e24;
            --bg-card: #20222b;
            --bg-card-header: #18191f;
            --text-main: #ffffff;
            --accent-color: #a8ff3e; /* Màu xanh lá dạ quang */
            --border-color: #2a2d35;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
        }

        /* === THANH ĐIỀU HƯỚNG (NAVBAR) === */
        header {
            background-color: var(--bg-header);
            border-bottom: 1px solid #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        .nav-links i {
            font-size: 12px;
        }

        .auth-buttons {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .auth-btn {
            background-color: #2a2c35;
            border: 1px solid #333;
            color: var(--text-main);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .auth-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .separator {
            color: #555;
            font-size: 14px;
        }

        /* === KHUNG SẢN PHẨM (GRID) === */
        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        /* === THIẾT KẾ THẺ SẢN PHẨM === */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, border-color 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #444;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .card-header {
            background-color: var(--bg-card-header);
            padding: 15px;
            text-align: center;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
        }

        .card-footer {
            padding: 15px;
            background-color: var(--bg-card-header);
            text-align: center;
        }

        /* Nút Xem Ngay với 2 gạch chéo màu xanh 2 bên (Giống trong ảnh) */
        .view-btn {
            background-color: transparent;
            color: var(--text-main);
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            padding: 5px 40px;
            transition: color 0.3s;
        }

        .view-btn::before, .view-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 18px;
            background-color: var(--accent-color);
        }

        .view-btn::before {
            left: 0;
            transform: translateY(-50%) rotate(20deg);
        }

        .view-btn::after {
            right: 0;
            transform: translateY(-50%) rotate(-20deg);
        }

        .view-btn:hover {
            color: var(--accent-color);
        }

        /* === POPUP (MODAL) GIAO DIỆN TỐI === */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            animation: slideDown 0.3s;
            box-shadow: 0 0 20px rgba(168, 255, 62, 0.1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }

        .close-btn:hover {
            color: var(--accent-color);
        }

        .modal h2 {
            margin-bottom: 15px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .link-btn {
            display: block;
            text-decoration: none;
            padding: 12px;
            margin: 15px 0;
            border-radius: 4px;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.2s, opacity 0.3s;
        }

        .link-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .btn-author { background-color: #ffffff; }
        .btn-download { background-color: var(--accent-color); }

        /* Responsive */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 20px; padding: 15px; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-links">
            <a href="#">Trang chủ</a>
            <a href="#">Nạp tiền <i class="fa-solid fa-caret-down"></i></a>
            <a href="#">Hỗ trợ <i class="fa-solid fa-caret-down"></i></a>
            <a href="#">Giao lưu <i class="fa-solid fa-caret-down"></i></a>
        </div>
        <div class="auth-buttons">
            <button class="auth-btn"><i class="fa-regular fa-pen-to-square"></i> Đăng ký</button>
            <span class="separator">hoặc</span>
            <button class="auth-btn"><i class="fa-regular fa-user"></i> Đăng nhập</button>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            
            <div class="card">
                <div class="card-header">Flashcard Lập Trình Web</div>
                <img class="card-image" src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80" alt="Sản phẩm 1">
                <div class="card-footer">
                    <button class="view-btn" onclick="openModal('https://fb.com/author1', 'https://drive.google.com/file1')">Xem ngay</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Flashcard Tiếng Anh Giao Tiếp</div>
                <img class="card-image" src="https://images.unsplash.com/photo-1546410531-bea4edad4460?auto=format&fit=crop&w=600&q=80" alt="Sản phẩm 2">
                <div class="card-footer">
                    <button class="view-btn" onclick="openModal('https://fb.com/author2', 'https://drive.google.com/file2')">Xem ngay</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Flashcard Từ Vựng JLPT N3</div>
                <img class="card-image" src="https://images.unsplash.com/photo-1528164344705-47542687000d?auto=format&fit=crop&w=600&q=80" alt="Sản phẩm 3">
                <div class="card-footer">
                    <button class="view-btn" onclick="openModal('https://fb.com/author3', 'https://drive.google.com/file3')">Xem ngay</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Tài Liệu Đồ Họa Photoshop</div>
                <img class="card-image" src="https://images.unsplash.com/photo-1561070791-2526d30994b5?auto=format&fit=crop&w=600&q=80" alt="Sản phẩm 4">
                <div class="card-footer">
                    <button class="view-btn" onclick="openModal('https://fb.com/author4', 'https://drive.google.com/file4')">Xem ngay</button>
                </div>
            </div>

             <div class="card">
                <div class="card-header">Bí Kíp Marketing 0 Đồng</div>
                <img class="card-image" src="https://images.unsplash.com/photo-1432888498266-38ffec3eaf0a?auto=format&fit=crop&w=600&q=80" alt="Sản phẩm 5">
                <div class="card-footer">
                    <button class="view-btn" onclick="openModal('https://fb.com/author5', 'https://drive.google.com/file5')">Xem ngay</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">Template CV Xin Việc IT</div>
                <img class="card-image" src="https://images.unsplash.com/photo-1586281380349-632531db7ed4?auto=format&fit=crop&w=600&q=80" alt="Sản phẩm 6">
                <div class="card-footer">
                    <button class="view-btn" onclick="openModal('https://fb.com/author6', 'https://drive.google.com/file6')">Xem ngay</button>
                </div>
            </div>

        </div>
    </div>

    <div id="buyModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>CHỌN HÀNH ĐỘNG</h2>
            <p style="margin-bottom: 20px; color: #a0a0a0; font-size: 14px;">Bạn muốn đi đến đâu tiếp theo?</p>
            <a id="authorLink" href="#" target="_blank" class="link-btn btn-author"><i class="fa-solid fa-user-tie"></i> Trang Tác Giả</a>
            <a id="downloadLink" href="#" target="_blank" class="link-btn btn-download"><i class="fa-solid fa-cloud-arrow-down"></i> Tải Flashcard</a>
        </div>
    </div>

    <script>
        const modal = document.getElementById("buyModal");
        const authorLinkBtn = document.getElementById("authorLink");
        const downloadLinkBtn = document.getElementById("downloadLink");

        // Nhận dữ liệu link khi ấn vào nút Xem Ngay của từng sản phẩm
        function openModal(authorUrl, downloadUrl) {
            authorLinkBtn.href = authorUrl;
            downloadLinkBtn.href = downloadUrl;
            modal.style.display = "flex";
        }

        function closeModal() {
            modal.style.display = "none";
        }

        // Đóng khi click ra ngoài khung popup
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>

</body>
</html>
